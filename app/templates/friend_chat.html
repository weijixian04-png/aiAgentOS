<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好友聊天 - cnAgentOS</title>
    <link rel="stylesheet" href="/static/dist/layui-v2.13.6/layui/css/layui.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #f7f7f8; height: 100vh; overflow: hidden; }
        
        .chat-container { display: flex; height: 100vh; }
        
        .sidebar { width: 280px; background: #fff; border-right: 1px solid #e5e5e5; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #e5e5e5; }
        .sidebar-header h2 { font-size: 16px; font-weight: 600; margin-bottom: 15px; }
        
        .search-box { position: relative; }
        .search-box input { width: 100%; padding: 10px 30px; border: 1px solid #e5e5e5; border-radius: 8px; font-size: 14px; }
        .search-box .icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #999; }
        
        .tabs { display: flex; margin-top: 15px; border-bottom: 1px solid #e5e5e5; }
        .tab-item { flex: 1; padding: 10px; text-align: center; font-size: 14px; cursor: pointer; color: #666; position: relative; }
        .tab-item.active { color: #10a37f; font-weight: 500; }
        .tab-item.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 30px; height: 2px; background: #10a37f; }
        
        .tab-content { flex: 1; overflow-y: auto; padding: 10px; }
        
        .friend-item { padding: 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.2s; margin-bottom: 5px; }
        .friend-item:hover { background: #f5f5f5; }
        .friend-item.active { background: #e8f5f1; }
        .friend-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 16px; }
        .friend-info { flex: 1; min-width: 0; }
        .friend-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .friend-status { font-size: 12px; color: #999; }
        .unread-badge { background: #ff6b6b; color: #fff; font-size: 11px; padding: 2px 6px; border-radius: 10px; min-width: 18px; text-align: center; }
        
        .request-item { padding: 12px; border-radius: 8px; background: #fff; border: 1px solid #e5e5e5; margin-bottom: 10px; }
        .request-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .request-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; }
        .request-info { flex: 1; }
        .request-name { font-size: 14px; font-weight: 500; }
        .request-time { font-size: 12px; color: #999; }
        .request-actions { display: flex; gap: 10px; }
        .btn-accept { padding: 6px 15px; background: #10a37f; color: #fff; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; }
        .btn-reject { padding: 6px 15px; background: #f5f5f5; color: #666; border: 1px solid #e5e5e5; border-radius: 4px; font-size: 13px; cursor: pointer; }
        
        .add-friend-section { padding: 15px; }
        .add-friend-input { width: 100%; padding: 10px; border: 1px solid #e5e5e5; border-radius: 8px; font-size: 14px; margin-bottom: 10px; }
        .btn-add-friend { width: 100%; padding: 10px; background: #10a37f; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
        
        .empty-state { text-align: center; padding: 40px 20px; color: #999; }
        .empty-state-icon { font-size: 48px; margin-bottom: 15px; }
        
        .main-content { flex: 1; display: flex; flex-direction: column; background: #f7f7f8; }
        .chat-header { padding: 15px 20px; background: #fff; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; gap: 15px; }
        .chat-header-avatar { width: 44px; height: 44px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 18px; }
        .chat-header-info { flex: 1; }
        .chat-header-name { font-size: 16px; font-weight: 600; }
        .chat-header-status { font-size: 13px; color: #666; }
        .chat-header-back { display: none; font-size: 20px; cursor: pointer; }
        
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; }
        .message { max-width: 80%; margin-bottom: 20px; display: flex; gap: 12px; }
        .message.user { margin-left: auto; flex-direction: row-reverse; }
        .message-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
        .message.user .message-avatar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
        .message.friend .message-avatar { background: #10a37f; color: #fff; }
        
        .message-content { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; word-break: break-all; }
        .message.user .message-content { background: #10a37f; color: #fff; border-radius: 12px 12px 0 12px; }
        .message.friend .message-content { background: #fff; border-radius: 12px 12px 12px 0; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        
        .message-time { font-size: 11px; color: #999; margin-top: 4px; }
        .message.user .message-time { text-align: right; }
        .message.friend .message-time { text-align: left; }
        
        .chat-input-container { padding: 15px 20px; background: #fff; border-top: 1px solid #e5e5e5; }
        .chat-input-wrapper { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
        .chat-input { flex: 1; padding: 12px 15px; border: 1px solid #e5e5e5; border-radius: 25px; font-size: 14px; resize: none; min-height: 44px; max-height: 120px; line-height: 1.5; }
        .chat-input:focus { outline: none; border-color: #10a37f; }
        .send-btn { width: 44px; height: 44px; background: #10a37f; border: none; border-radius: 50%; color: #fff; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .send-btn:hover { background: #0d8a6a; }
        .send-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        .welcome-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
        .welcome-screen h2 { font-size: 24px; margin-bottom: 15px; }
        .welcome-screen p { color: #666; font-size: 14px; }
        
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; z-index: 10; left: -100%; transition: left 0.3s; }
            .sidebar.show { left: 0; }
            .chat-header-back { display: block; }
            .main-content { width: 100%; }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>📧 好友聊天</h2>
            <div class="search-box">
                <span class="icon">🔍</span>
                <input type="text" id="searchInput" placeholder="搜索好友...">
            </div>
            <div class="tabs">
                <div class="tab-item active" data-tab="friends">好友列表</div>
                <div class="tab-item" data-tab="requests">好友请求</div>
                <div class="tab-item" data-tab="add">添加好友</div>
            </div>
        </div>
        
        <div class="tab-content">
            <div class="tab-panel active" id="friendsPanel">
                <div id="friendsList">
                    <div class="empty-state">
                        <div class="empty-state-icon">👥</div>
                        <p>暂无好友</p>
                        <p style="font-size: 12px;">去添加好友开始聊天吧</p>
                    </div>
                </div>
            </div>
            
            <div class="tab-panel" id="requestsPanel">
                <div id="requestsList">
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>暂无好友请求</p>
                    </div>
                </div>
            </div>
            
            <div class="tab-panel" id="addPanel">
                <div class="add-friend-section">
                    <input type="text" class="add-friend-input" id="addFriendInput" placeholder="输入用户名搜索">
                    <button class="btn-add-friend" onclick="searchUser()">搜索用户</button>
                    <div id="searchResult" style="margin-top: 15px;"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="main-content">
        <div class="chat-header">
            <span class="chat-header-back" onclick="toggleSidebar()">☰</span>
            <div class="chat-header-avatar" id="currentFriendAvatar">👤</div>
            <div class="chat-header-info">
                <div class="chat-header-name" id="currentFriendName">选择好友开始聊天</div>
                <div class="chat-header-status" id="currentFriendStatus">在线</div>
            </div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="welcome-screen">
                <h2>💬 开始聊天</h2>
                <p>从左侧选择一个好友开始对话</p>
            </div>
        </div>
        
        <div class="chat-input-container">
            <div class="chat-input-wrapper">
                <textarea class="chat-input" id="chatInput" placeholder="输入消息..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>
</div>

<input type="hidden" id="xsrf_token" value="{{ xsrf_token }}">
<input type="hidden" id="currentFriendId" value="">

<script src="/static/dist/layui-v2.13.6/layui/layui.js"></script>
<script>
var currentFriendId = '';
var xsrfToken = document.getElementById('xsrf_token').value;
var searchInput = document.getElementById('searchInput');
var chatInput = document.getElementById('chatInput');
var sendBtn = document.getElementById('sendBtn');
var chatMessages = document.getElementById('chatMessages');

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('show');
}

document.querySelectorAll('.tab-item').forEach(function(item) {
    item.addEventListener('click', function() {
        document.querySelectorAll('.tab-item').forEach(function(t) { t.classList.remove('active'); });
        document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
        this.classList.add('active');
        document.getElementById(this.dataset.tab + 'Panel').classList.add('active');
        
        if (this.dataset.tab === 'friends') {
            loadFriends();
        } else if (this.dataset.tab === 'requests') {
            loadRequests();
        }
    });
});

searchInput.addEventListener('input', function() {
    filterFriends(this.value);
});

chatInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

chatInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

function filterFriends(keyword) {
    var items = document.querySelectorAll('.friend-item');
    items.forEach(function(item) {
        var name = item.querySelector('.friend-name').textContent;
        if (keyword === '' || name.toLowerCase().includes(keyword.toLowerCase())) {
            item.style.display = 'flex';
        } else {
            item.style.display = 'none';
        }
    });
}

function loadFriends() {
    fetch('/api/friend?action=list')
        .then(res => res.json())
        .then(data => {
            if (data.code === 0) {
                if (data.data.length === 0) {
                    document.getElementById('friendsList').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">👥</div>
                            <p>暂无好友</p>
                            <p style="font-size: 12px;">去添加好友开始聊天吧</p>
                        </div>
                    `;
                } else {
                    var html = '';
                    data.data.forEach(function(friend) {
                        html += `
                            <div class="friend-item" data-id="${friend.id}" onclick="selectFriend(${friend.id}, '${friend.username}')">
                                <div class="friend-avatar">${friend.username.slice(0, 1).toUpperCase()}</div>
                                <div class="friend-info">
                                    <div class="friend-name">${friend.username}</div>
                                    <div class="friend-status">在线</div>
                                </div>
                            </div>
                        `;
                    });
                    document.getElementById('friendsList').innerHTML = html;
                }
            }
        });
}

function loadRequests() {
    fetch('/api/friend?action=requests')
        .then(res => res.json())
        .then(data => {
            if (data.code === 0) {
                if (data.data.length === 0) {
                    document.getElementById('requestsList').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>暂无好友请求</p>
                        </div>
                    `;
                } else {
                    var html = '';
                    data.data.forEach(function(req) {
                        html += `
                            <div class="request-item">
                                <div class="request-header">
                                    <div class="request-avatar">${req.username.slice(0, 1).toUpperCase()}</div>
                                    <div class="request-info">
                                        <div class="request-name">${req.username}</div>
                                        <div class="request-time">${req.request_time}</div>
                                    </div>
                                </div>
                                <div class="request-actions">
                                    <button class="btn-accept" onclick="acceptRequest(${req.id})">通过</button>
                                    <button class="btn-reject" onclick="rejectRequest(${req.id})">拒绝</button>
                                </div>
                            </div>
                        `;
                    });
                    document.getElementById('requestsList').innerHTML = html;
                }
            }
        });
}

function searchUser() {
    var keyword = document.getElementById('addFriendInput').value.trim();
    if (!keyword) {
        layer.msg('请输入用户名');
        return;
    }
    
    fetch('/api/friend?action=search&keyword=' + encodeURIComponent(keyword))
        .then(res => res.json())
        .then(data => {
            if (data.code === 0) {
                if (data.data.length === 0) {
                    document.getElementById('searchResult').innerHTML = '<p style="color: #999; text-align: center;">未找到用户</p>';
                } else {
                    var html = '';
                    data.data.forEach(function(user) {
                        html += `
                            <div class="friend-item" style="border: 1px solid #e5e5e5;">
                                <div class="friend-avatar">${user.username.slice(0, 1).toUpperCase()}</div>
                                <div class="friend-info">
                                    <div class="friend-name">${user.username}</div>
                                    <div class="friend-status">${user.role}</div>
                                </div>
                                ${user.is_friend ? 
                                    '<span style="color: #10a37f; font-size: 12px;">已添加</span>' : 
                                    '<button class="btn-add-friend" style="width: auto; padding: 5px 12px; font-size: 12px;" onclick="addFriend(\'' + user.username + '\')">添加</button>'
                                }
                            </div>
                        `;
                    });
                    document.getElementById('searchResult').innerHTML = html;
                }
            }
        });
}

function addFriend(username) {
    var formData = new FormData();
    formData.append('action', 'add');
    formData.append('username', username);
    formData.append('_xsrf', xsrfToken);
    
    fetch('/api/friend', {
        method: 'POST',
        body: formData
    }).then(res => res.json())
      .then(data => {
          layer.msg(data.msg);
          if (data.code === 0) {
              document.getElementById('searchResult').innerHTML = '<p style="color: #10a37f; text-align: center;">好友请求已发送</p>';
          }
      });
}

function acceptRequest(friendId) {
    var formData = new FormData();
    formData.append('action', 'accept');
    formData.append('friend_id', friendId);
    formData.append('_xsrf', xsrfToken);
    
    fetch('/api/friend', {
        method: 'POST',
        body: formData
    }).then(res => res.json())
      .then(data => {
          layer.msg(data.msg);
          if (data.code === 0) {
              loadRequests();
              loadFriends();
              VoiceHelper.sayInfo('好友请求已通过');
          }
      });
}

function rejectRequest(friendId) {
    if (!confirm('确定拒绝该好友请求？')) return;
    
    var formData = new FormData();
    formData.append('action', 'reject');
    formData.append('friend_id', friendId);
    formData.append('_xsrf', xsrfToken);
    
    fetch('/api/friend', {
        method: 'POST',
        body: formData
    }).then(res => res.json())
      .then(data => {
          layer.msg(data.msg);
          if (data.code === 0) {
              loadRequests();
          }
      });
}

function selectFriend(friendId, friendName) {
    currentFriendId = friendId;
    document.getElementById('currentFriendId').value = friendId;
    document.getElementById('currentFriendName').textContent = friendName;
    document.getElementById('currentFriendAvatar').textContent = friendName.slice(0, 1).toUpperCase();
    
    document.querySelectorAll('.friend-item').forEach(function(item) {
        item.classList.remove('active');
    });
    document.querySelector(`[data-id="${friendId}"]`).classList.add('active');
    
    chatMessages.innerHTML = '';
    loadMessages();
    
    if (window.innerWidth < 768) {
        document.getElementById('sidebar').classList.remove('show');
    }
}

function loadMessages() {
    if (!currentFriendId) return;
    
    fetch('/api/chat/private?action=messages&friend_id=' + currentFriendId)
        .then(res => res.json())
        .then(data => {
            if (data.code === 0) {
                data.data.forEach(function(msg) {
                    addMessage(msg);
                });
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        });
}

function sendMessage() {
    var content = chatInput.value.trim();
    if (!content || !currentFriendId) return;
    
    var formData = new FormData();
    formData.append('action', 'send');
    formData.append('friend_id', currentFriendId);
    formData.append('content', content);
    formData.append('_xsrf', xsrfToken);
    
    fetch('/api/chat/private', {
        method: 'POST',
        body: formData
    }).then(res => res.json())
      .then(data => {
          if (data.code === 0) {
              chatInput.value = '';
              chatInput.style.height = 'auto';
              loadMessages();
          } else {
              layer.msg(data.msg);
          }
      });
}

function addMessage(msg) {
    var div = document.createElement('div');
    div.className = 'message ' + (msg.from_user_id == currentFriendId ? 'friend' : 'user');
    var avatar = msg.from_user_id == currentFriendId ? 
        document.getElementById('currentFriendAvatar').textContent : 
        '{{ current_user[:1].upper() }}';
    
    div.innerHTML = `
        <div class="message-avatar">${avatar}</div>
        <div class="message-content-wrapper">
            <div class="message-content">${escapeHtml(msg.content)}</div>
            <div class="message-time">${msg.send_time}</div>
        </div>
    `;
    chatMessages.appendChild(div);
}

function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

loadFriends();

setInterval(function() {
    if (currentFriendId) {
        loadMessages();
    }
}, 3000);
</script>

<!-- 手势交互系统 -->
<script src="/gesture_control/frontend/gesture_loader.js"></script>
</body>
</html>
