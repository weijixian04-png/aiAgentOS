<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数智大屏 - cnAgentOS</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2.1.0/dist/echarts-wordcloud.min.js"></script>
    <script src="/static/dist/jquery-3.6.0/jquery.min.js"></script>
    <script src="/static/js/common.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0e17 0%, #1a1f35 50%, #0d1117 100%);
            color: #e6edf3;
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        .screen-container {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-rows: 70px 1fr 80px;
            grid-template-columns: 280px 1fr 320px;
            gap: 0;
            padding: 10px;
        }
        .header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(90deg, rgba(24,144,255,0.2) 0%, rgba(114,46,209,0.2) 50%, rgba(24,144,255,0.2) 100%);
            border-bottom: 2px solid rgba(0,212,255,0.3);
            padding: 0 30px;
        }
        .header-title {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #722ed1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0,212,255,0.5);
            letter-spacing: 4px;
        }
        .header-time {
            font-size: 18px;
            color: #8b949e;
        }
        .header-time span { color: #00d4ff; }
        .sidebar {
            background: rgba(26,31,53,0.8);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
        }
        .main-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .right-panel {
            background: rgba(26,31,53,0.8);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
        }
        .section-title {
            font-size: 16px;
            color: #00d4ff;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0,212,255,0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: linear-gradient(180deg, #00d4ff, #722ed1);
            border-radius: 2px;
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(24,144,255,0.1) 0%, rgba(114,46,209,0.1) 100%);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            transition: all 0.3s;
        }
        .stat-card:hover {
            border-color: rgba(0,212,255,0.5);
            box-shadow: 0 0 20px rgba(0,212,255,0.2);
            transform: translateX(5px);
        }
        .stat-card .label {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 5px;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
        }
        .stat-card .value.positive { color: #52c41a; }
        .stat-card .value.negative { color: #ff4d4f; }
        .stat-card .value.neutral { color: #1890ff; }
        .stat-card .sub { font-size: 11px; color: #6e7681; margin-top: 3px; }
        .chart-container {
            background: rgba(26,31,53,0.6);
            border: 1px solid rgba(0,212,255,0.15);
            border-radius: 8px;
            padding: 10px;
            flex: 1;
            min-height: 0;
        }
        .globe-container {
            flex: 2;
            background: transparent;
            border: none;
            position: relative;
        }
        #globeChart {
            width: 100%;
            height: 100%;
        }
        .globe-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            pointer-events: none;
            border: 1px solid rgba(0,212,255,0.1);
            border-radius: 50%;
        }
        .bottom-bar {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            background: rgba(26,31,53,0.6);
            border-top: 1px solid rgba(0,212,255,0.2);
            font-size: 13px;
            color: #8b949e;
        }
        .bottom-bar .item { display: flex; align-items: center; gap: 6px; }
        .bottom-bar .dot { width: 8px; height: 8px; border-radius: 50%; }
        .bottom-bar .dot.green { background: #52c41a; box-shadow: 0 0 6px #52c41a; }
        .bottom-bar .dot.blue { background: #1890ff; box-shadow: 0 0 6px #1890ff; }
        .bottom-bar .dot.purple { background: #722ed1; box-shadow: 0 0 6px #722ed1; }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10,14,23,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .loading-text {
            font-size: 24px;
            color: #00d4ff;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .control-btn {
            background: rgba(24,144,255,0.2);
            border: 1px solid rgba(0,212,255,0.3);
            color: #00d4ff;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        .control-btn:hover {
            background: rgba(0,212,255,0.3);
            box-shadow: 0 0 10px rgba(0,212,255,0.3);
        }
        .control-btn.active {
            background: rgba(0,212,255,0.4);
            border-color: #00d4ff;
        }
        .mini-chart { height: 120px; }
        .flow-list { max-height: 150px; overflow-y: auto; }
        .flow-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
            margin-bottom: 6px;
            font-size: 12px;
        }
        .flow-item .from { color: #8b949e; }
        .flow-item .to { color: #00d4ff; }
        .flow-item .count { color: #52c41a; font-weight: bold; }
        .scroll-text {
            font-size: 12px;
            color: #8b949e;
            max-height: 100px;
            overflow-y: auto;
            line-height: 1.6;
        }
        .scroll-text .item { margin-bottom: 8px; padding-left: 10px; border-left: 2px solid #1890ff; }
        .scroll-text .item .time { color: #6e7681; font-size: 11px; }
        .scroll-text .item .title { color: #e6edf3; margin: 3px 0; }
        .scroll-text .item.positive { border-color: #52c41a; }
        .scroll-text .item.negative { border-color: #ff4d4f; }
        .scroll-text .item.neutral { border-color: #1890ff; }
        .pulse-point {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ff4d4f;
            border-radius: 50%;
            animation: pulsePoint 2s infinite;
        }
        @keyframes pulsePoint {
            0% { box-shadow: 0 0 0 0 rgba(255,77,79,0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255,77,79,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,77,79,0); }
        }
        .progress-bar {
            height: 4px;
            background: rgba(0,212,255,0.2);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #722ed1);
            border-radius: 2px;
            transition: width 0.3s;
        }
        .fullscreen-btn {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 100;
            background: rgba(24,144,255,0.2);
            border: 1px solid rgba(0,212,255,0.3);
            color: #00d4ff;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .fullscreen-btn:hover {
            background: rgba(0,212,255,0.3);
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.3); border-radius: 2px; }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-text">数智大屏加载中...</div>
    </div>

    <div class="fullscreen-btn" onclick="toggleFullscreen()" title="全屏切换">
        <i class="fas fa-expand"></i>
    </div>

    <div class="screen-container">
        <div class="header">
            <div class="header-title">数智舆情监测平台</div>
            <div class="header-time">
                <span id="currentTime"></span> |
                数据刷新: <span id="refreshTime">--</span>
            </div>
        </div>

        <div class="sidebar">
            <div class="section-title">总览统计</div>
            <div class="stat-card">
                <div class="label">舆情总量</div>
                <div class="value" id="totalCount">0</div>
                <div class="sub">较昨日 <span id="totalChange">+0</span></div>
            </div>
            <div class="stat-card">
                <div class="label">正面舆情</div>
                <div class="value positive" id="positiveCount">0</div>
                <div class="sub">占比 <span id="positiveRatio">0%</span></div>
            </div>
            <div class="stat-card">
                <div class="label">负面舆情</div>
                <div class="value negative" id="negativeCount">0</div>
                <div class="sub">占比 <span id="negativeRatio">0%</span></div>
            </div>
            <div class="stat-card">
                <div class="label">中性舆情</div>
                <div class="value neutral" id="neutralCount">0</div>
                <div class="sub">占比 <span id="neutralRatio">0%</span></div>
            </div>
            <div class="stat-card">
                <div class="label">高风险预警</div>
                <div class="value negative" id="highRiskCount">0</div>
                <div class="sub">需关注</div>
            </div>

            <div class="section-title">情感分布</div>
            <div class="chart-container mini-chart" id="sentimentPieChart"></div>

            <div class="section-title">来源分布</div>
            <div class="chart-container mini-chart" id="sourceBarChart"></div>
        </div>

        <div class="main-area">
            <div class="globe-container chart-container">
                <div id="globeChart"></div>
                <div class="globe-overlay"></div>
            </div>
            <div class="chart-container" style="flex:1;">
                <div class="section-title">舆情趋势</div>
                <div id="timelineChart" style="height: 100%;"></div>
            </div>
        </div>

        <div class="right-panel">
            <div class="section-title">实时预警</div>
            <div class="controls">
                <button class="control-btn active" data-type="all">全部</button>
                <button class="control-btn" data-type="negative">负面</button>
                <button class="control-btn" data-type="risk">风险</button>
            </div>
            <div class="scroll-text" id="alertList">
                <div class="no-data">暂无预警信息</div>
            </div>

            <div class="section-title">热词TOP10</div>
            <div class="chart-container mini-chart" id="hotwordsChart"></div>

            <div class="section-title">风险分布</div>
            <div class="chart-container mini-chart" id="riskChart"></div>

            <div class="section-title">今日热门</div>
            <div class="flow-list" id="hotList">
                <div class="no-data">暂无数据</div>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="item"><span class="dot green"></span> 系统正常</div>
            <div class="item"><span class="dot blue"></span> 数据采集</div>
            <div class="item"><span class="dot purple"></span> AI分析中</div>
            <div class="item">© 2026 cnAgentOS 数智舆情监测平台</div>
        </div>
    </div>

    <script>
        var globeChart, sentimentPieChart, sourceBarChart, timelineChart, hotwordsChart, riskChart;
        var refreshInterval = 30000;
        var currentAlertType = 'all';
        var isLoading = false;
        var loadCount = 0;
        var totalLoadTasks = 4;
        var previousHighRiskCount = 0;
        var firstLoadCompleted = false;

        function updateTime() {
            var now = new Date();
            var timeStr = now.getFullYear() + '-' +
                String(now.getMonth() + 1).padStart(2, '0') + '-' +
                String(now.getDate()).padStart(2, '0') + ' ' +
                String(now.getHours()).padStart(2, '0') + ':' +
                String(now.getMinutes()).padStart(2, '0') + ':' +
                String(now.getSeconds()).padStart(2, '0');
            document.getElementById('currentTime').textContent = timeStr;
        }

        function initCharts() {
            globeChart = echarts.init(document.getElementById('globeChart'));
            sentimentPieChart = echarts.init(document.getElementById('sentimentPieChart'));
            sourceBarChart = echarts.init(document.getElementById('sourceBarChart'));
            timelineChart = echarts.init(document.getElementById('timelineChart'));
            hotwordsChart = echarts.init(document.getElementById('hotwordsChart'));
            riskChart = echarts.init(document.getElementById('riskChart'));

            window.addEventListener('resize', function() {
                globeChart.resize();
                sentimentPieChart.resize();
                sourceBarChart.resize();
                timelineChart.resize();
                hotwordsChart.resize();
                riskChart.resize();
            });
        }

        function loadAllData() {
            if (isLoading) return;
            
            isLoading = true;
            loadCount = 0;
            document.getElementById('loadingOverlay').style.display = 'flex';

            $.when(
                loadOverviewStats(),
                loadGlobeData(),
                loadTimelineData(),
                loadAlertData()
            ).done(function() {
                document.getElementById('refreshTime').textContent = new Date().toLocaleTimeString();
                isLoading = false;
                
                if (!firstLoadCompleted) {
                    VoiceHelper.sayInfo('舆情分析已完成');
                    firstLoadCompleted = true;
                }
                
                setTimeout(function() {
                    document.getElementById('loadingOverlay').style.display = 'none';
                }, 300);
            }).fail(function() {
                isLoading = false;
                document.getElementById('loadingOverlay').style.display = 'none';
            });
        }

        function loadOverviewStats() {
            return $.ajax({
                url: '/api/sentiment/stats?type=all&days=7&cache=true',
                timeout: 15000
            }).done(function(res) {
                if (res.code === 0) {
                    var data = res.data;
                    var stats = data.stats;

                    document.getElementById('totalCount').textContent = stats.total || 0;

                    var bySentiment = {};
                    (stats.by_sentiment || []).forEach(function(item) {
                        bySentiment[item.sentiment] = item.count;
                    });

                    var total = stats.total || 1;
                    var positive = bySentiment['positive'] || 0;
                    var negative = bySentiment['negative'] || 0;
                    var neutral = bySentiment['neutral'] || 0;

                    document.getElementById('positiveCount').textContent = positive;
                    document.getElementById('negativeCount').textContent = negative;
                    document.getElementById('neutralCount').textContent = neutral;

                    document.getElementById('positiveRatio').textContent = ((positive / total) * 100).toFixed(1) + '%';
                    document.getElementById('negativeRatio').textContent = ((negative / total) * 100).toFixed(1) + '%';
                    document.getElementById('neutralRatio').textContent = ((neutral / total) * 100).toFixed(1) + '%';

                    var highRisk = 0;
                    (stats.by_risk || []).forEach(function(item) {
                        if (item.risk_level === 'high') highRisk = item.count;
                    });
                    document.getElementById('highRiskCount').textContent = highRisk;

                    if (highRisk > previousHighRiskCount && highRisk > 0) {
                        VoiceHelper.sayWarning('检测到舆情风险，请及时查看');
                    }
                    previousHighRiskCount = highRisk;

                    renderSentimentPie(stats.by_sentiment || []);
                    renderSourceBar(stats.by_source || []);
                    renderHotwords(data.hotwords || []);
                    renderRisk(stats.by_risk || []);
                }
            }).fail(function() {
                console.warn('Failed to load overview stats');
            });
        }

        function loadGlobeData() {
            return $.ajax({
                url: '/api/sentiment/stats?type=geo&limit=500&cache=true',
                timeout: 15000
            }).done(function(res) {
                if (res.code === 0) {
                    var data = res.data;
                    renderGlobe(data);
                }
            }).fail(function() {
                console.warn('Failed to load globe data');
            });
        }

        function renderGlobe(data) {
            var option = {
                backgroundColor: 'transparent',
                geo3D: {
                    map: 'world',
                    roam: true,
                    silent: true,
                    itemStyle: {
                        color: '#1a3a5c',
                        opacity: 0.9,
                        borderWidth: 0.5,
                        borderColor: '#00d4ff'
                    },
                    emphasis: {
                        itemStyle: {
                            color: '#2a5a8c'
                        }
                    },
                    regions: [{
                        name: 'China',
                        itemStyle: {
                            color: '#1e4d7b',
                            opacity: 0.95
                        }
                    }],
                    light: {
                        main: {
                            intensity: 1.2,
                            shadow: true,
                            shadowQuality: 'high',
                            alpha: 40,
                            beta: 30
                        },
                        ambient: {
                            intensity: 0.4
                        }
                    },
                    viewControl: {
                        distance: 100,
                        alpha: 40,
                        beta: 20,
                        center: [0, 0, 0]
                    }
                },
                series: [{
                    type: 'scatter3D',
                    coordinateSystem: 'geo3D',
                    symbol: 'circle',
                    symbolSize: function(val) {
                        var value = val[2] || 1;
                        return Math.max(3, Math.min(15, value * 2));
                    },
                    itemStyle: {
                        color: function(params) {
                            var sentiment = params.data.sentiment || 'neutral';
                            if (sentiment === 'positive') return '#52c41a';
                            if (sentiment === 'negative') return '#ff4d4f';
                            return '#1890ff';
                        },
                        opacity: 0.9,
                        shadowBlur: 10,
                        shadowColor: '#00d4ff'
                    },
                    data: data.data || []
                }, {
                    type: 'lines3D',
                    coordinateSystem: 'geo3D',
                    effect: {
                        show: true,
                        period: 4,
                        trailLength: 0.4,
                        color: '#00d4ff',
                        symbolSize: 2
                    },
                    lineStyle: {
                        width: 1,
                        color: '#00d4ff',
                        opacity: 0.6
                    },
                    data: []
                }]
            };
            globeChart.setOption(option);
        }

        function loadTimelineData() {
            return $.ajax({
                url: '/api/sentiment/stats?type=timeline&granularity=day&days=7&cache=true',
                timeout: 15000
            }).done(function(res) {
                if (res.code === 0) {
                    renderTimeline(res.data);
                }
            }).fail(function() {
                console.warn('Failed to load timeline data');
            });
        }

        function renderTimeline(data) {
            var timeData = [];
            var totalData = [];
            var positiveData = [];
            var negativeData = [];
            var neutralData = [];

            if (data.xAxis && data.xAxis.data) {
                timeData = data.xAxis.data;
                data.series.forEach(function(s) {
                    if (s.name === '总量') totalData = s.data;
                    else if (s.name === '正面') positiveData = s.data;
                    else if (s.name === '负面') negativeData = s.data;
                    else if (s.name === '中性') neutralData = s.data;
                });
            } else {
                (data || []).forEach(function(item) {
                    timeData.push(item.time_bucket);
                    totalData.push(item.total_count);
                    positiveData.push(item.positive_count || 0);
                    negativeData.push(item.negative_count || 0);
                    neutralData.push(item.neutral_count || 0);
                });
            }

            var option = {
                backgroundColor: 'transparent',
                tooltip: {trigger: 'axis'},
                legend: {
                    data: ['总量', '正面', '负面', '中性'],
                    bottom: 10,
                    textStyle: {color: '#8b949e'}
                },
                grid: {left: '3%', right: '4%', bottom: '20%', top: '10%', containLabel: true},
                xAxis: {
                    type: 'category',
                    boundaryGap: false,
                    data: timeData,
                    axisLine: {lineStyle: {color: '#2a3146'}},
                    axisLabel: {color: '#8b949e'}
                },
                yAxis: {
                    type: 'value',
                    axisLine: {lineStyle: {color: '#2a3146'}},
                    axisLabel: {color: '#8b949e'},
                    splitLine: {lineStyle: {color: '#1e2436'}}
                },
                series: [
                    {
                        name: '总量',
                        type: 'bar',
                        data: totalData,
                        itemStyle: {color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            {offset: 0, color: '#00d4ff'},
                            {offset: 1, color: '#1890ff'}
                        ])}
                    },
                    {
                        name: '正面',
                        type: 'line',
                        smooth: true,
                        data: positiveData,
                        lineStyle: {width: 2, color: '#52c41a'},
                        itemStyle: {color: '#52c41a'}
                    },
                    {
                        name: '负面',
                        type: 'line',
                        smooth: true,
                        data: negativeData,
                        lineStyle: {width: 2, color: '#ff4d4f'},
                        itemStyle: {color: '#ff4d4f'}
                    },
                    {
                        name: '中性',
                        type: 'line',
                        smooth: true,
                        data: neutralData,
                        lineStyle: {width: 2, color: '#faad14'},
                        itemStyle: {color: '#faad14'}
                    }
                ]
            };
            timelineChart.setOption(option);
        }

        function renderSentimentPie(data) {
            var option = {
                backgroundColor: 'transparent',
                tooltip: {trigger: 'item', formatter: '{b}: {c} ({d}%)'},
                series: [{
                    type: 'pie',
                    radius: ['50%', '75%'],
                    center: ['50%', '50%'],
                    avoidLabelOverlap: false,
                    label: {show: false},
                    labelLine: {show: false},
                    data: data.map(function(item) {
                        return {
                            value: item.count,
                            name: item.sentiment === 'positive' ? '正面' : item.sentiment === 'negative' ? '负面' : '中性',
                            itemStyle: {
                                color: item.sentiment === 'positive' ? '#52c41a' : item.sentiment === 'negative' ? '#ff4d4f' : '#1890ff'
                            }
                        };
                    })
                }]
            };
            sentimentPieChart.setOption(option);
        }

        function renderSourceBar(data) {
            var option = {
                backgroundColor: 'transparent',
                tooltip: {trigger: 'axis'},
                grid: {left: '3%', right: '3%', bottom: '3%', top: '3%', containLabel: true},
                xAxis: {
                    type: 'category',
                    data: data.map(function(d){return d.source_type === 'scout' ? '瞭望' : '问答';}),
                    axisLine: {lineStyle: {color: '#2a3146'}},
                    axisLabel: {color: '#8b949e', fontSize: 10}
                },
                yAxis: {
                    type: 'value',
                    axisLine: {lineStyle: {color: '#2a3146'}},
                    axisLabel: {color: '#8b949e'},
                    splitLine: {lineStyle: {color: '#1e2436'}}
                },
                series: [{
                    type: 'bar',
                    data: data.map(function(d){return {value: d.count, itemStyle: {color: d.source_type === 'scout' ? '#1890ff' : '#722ed1'}};}),
                    barWidth: '50%'
                }]
            };
            sourceBarChart.setOption(option);
        }

        function renderHotwords(data) {
            var option = {
                backgroundColor: 'transparent',
                series: [{
                    type: 'wordCloud',
                    shape: 'circle',
                    left: 'center',
                    top: 'center',
                    width: '95%',
                    height: '95%',
                    sizeRange: [12, 40],
                    rotationRange: [-45, 45],
                    rotationStep: 15,
                    gridSize: 6,
                    drawOutOfBound: false,
                    textStyle: {
                        fontFamily: 'sans-serif',
                        fontWeight: 'bold',
                        color: function() {
                            return 'rgb(' + [
                                Math.round(Math.random() * 100 + 100),
                                Math.round(Math.random() * 100),
                                Math.round(Math.random() * 200 + 50)
                            ].join(',') + ')';
                        }
                    },
                    data: data.slice(0, 20).map(function(item) {
                        return {name: item.keyword, value: item.count};
                    })
                }]
            };
            hotwordsChart.setOption(option);
        }

        function renderRisk(data) {
            var option = {
                backgroundColor: 'transparent',
                tooltip: {trigger: 'item'},
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    center: ['50%', '50%'],
                    label: {show: true, formatter: '{b}: {c}', color: '#8b949e', fontSize: 10},
                    data: data.map(function(item) {
                        return {
                            value: item.count,
                            name: item.risk_level === 'low' ? '低风险' : item.risk_level === 'medium' ? '中风险' : '高风险',
                            itemStyle: {
                                color: item.risk_level === 'low' ? '#52c41a' : item.risk_level === 'medium' ? '#faad14' : '#ff4d4f'
                            }
                        };
                    })
                }]
            };
            riskChart.setOption(option);
        }

        function loadAlertData() {
            var params = 'page=1&limit=10';
            if (currentAlertType === 'negative') {
                params += '&sentiment=negative';
            } else if (currentAlertType === 'risk') {
                params += '&risk_level=high';
            }

            return $.ajax({
                url: '/api/sentiment?' + params,
                timeout: 15000
            }).done(function(res) {
                if (res.code === 0) {
                    renderAlertList(res.data || []);
                }
            }).fail(function() {
                console.warn('Failed to load alert data');
            });
        }

        function renderAlertList(data) {
            var container = document.getElementById('alertList');
            if (data.length === 0) {
                container.innerHTML = '<div class="no-data">暂无预警信息</div>';
                return;
            }

            var html = '';
            data.forEach(function(item) {
                var sentimentClass = item.sentiment || 'neutral';
                var sentimentText = sentimentClass === 'positive' ? '正面' : sentimentClass === 'negative' ? '负面' : '中性';
                html += '<div class="item ' + sentimentClass + '">';
                html += '<div class="title">' + (item.title || item.content || '').substring(0, 50) + '...</div>';
                html += '<div class="time">' + sentimentText + ' | ' + (item.analyze_time || '') + '</div>';
                html += '</div>';
            });
            container.innerHTML = html;
        }

        function loadHotList() {
            $.get('/api/sentiment/stats?type=hotwords&limit=10&cache=true', function(res) {
                if (res.code === 0) {
                    var container = document.getElementById('hotList');
                    var data = res.data || [];
                    if (data.length === 0) {
                        container.innerHTML = '<div class="no-data">暂无数据</div>';
                        return;
                    }

                    var html = '';
                    data.slice(0, 8).forEach(function(item, index) {
                        html += '<div class="flow-item">';
                        html += '<span class="to">' + (index + 1) + '. ' + item.keyword + '</span>';
                        html += '<span class="count">' + item.count + '</span>';
                        html += '</div>';
                    });
                    container.innerHTML = html;
                }
            });
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        document.querySelectorAll('.control-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.control-btn').forEach(function(b) { b.classList.remove('active'); });
                this.classList.add('active');
                currentAlertType = this.dataset.type;
                loadAlertData();
            });
        });

        setInterval(function() {
            loadAllData();
        }, refreshInterval);

        setInterval(function() {
            updateTime();
        }, 1000);

        updateTime();
        initCharts();
        loadAllData();
        loadHotList();

        setTimeout(function() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }, 1500);
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</body>
</html>
